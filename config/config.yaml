# Folktale Classifier Configuration

# Data paths
data:
  western_tales_path: "data/western/aft.csv"
  asian_tales_dir: "../"  # Parent directory (Downloads folder) where JSON files are located
  processed_dir: "data/processed/"
  embeddings_cache: "data/processed/embeddings/"

# Model configurations
model:
  # Sentence transformer for vectorization
  sentence_transformer: "sentence-transformers/all-MiniLM-L6-v2"
  embedding_dim: 384
  
  # Logistic regression hyperparameters
  regularization: "l2"
  C: 1.0  # Inverse of regularization strength
  max_iter: 1000
  solver: "lbfgs"
  
  # Random seed for reproducibility
  random_state: 42

# Clustering configuration
clustering:
  # SAE-Lens parameters
  sae_lens:
    enable: true
    sparsity_penalty: 0.1
    learning_rate: 0.0001
  
  # K-means alternative
  kmeans:
    enable: false
    n_clusters: 20
    n_init: 10
  
  # Gemmascope alternative
  gemmascope:
    enable: false
    n_components: 20

# Interpretability
interpretability:
  # Top tokens per feature
  top_tokens_k: 10
  
  # Top input features per cluster
  top_features_k: 20
  
  # N-gram analysis
  ngram_range: [1, 3]
  top_ngrams_k: 15
  
  # Representative stories per cluster
  n_representative_stories: 5

# Training configuration
training:
  test_size: 0.2
  validation_size: 0.1
  batch_size: 32
  epochs: 50
  early_stopping_patience: 5

# Evaluation
evaluation:
  # Metrics for confidence analysis
  compute_entropy: true
  compute_confidence: true
  
  # Visualization
  plot_confidence_distribution: true
  plot_entropy_distribution: true

# Paths for output
output:
  models_dir: "results/models/"
  embeddings_dir: "results/embeddings/"
  clusters_dir: "results/clusters/"
  plots_dir: "results/plots/"
  analysis_dir: "results/analysis/"

# Logging
logging:
  level: "INFO"
  file: "logs/folktale_classifier.log"
